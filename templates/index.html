{% extends 'base.html' %}

{% block content %}
<div class="layout">
  <section class="form-panel">
    <h2>Create your resume</h2>
    <form method="post">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone">

      <label for="summary">Professional Summary</label>
      <textarea id="summary" name="summary" rows="4"></textarea>

      <label for="skills">Skills (one per line)</label>
      <textarea id="skills" name="skills" rows="5"></textarea>

      <label for="experience">Experience (one item per line)</label>
      <textarea id="experience" name="experience" rows="5"></textarea>

      <label for="education">Education (one item per line)</label>
      <textarea id="education" name="education" rows="4"></textarea>

      <label for="projects">Projects (one item per line)</label>
      <textarea id="projects" name="projects" rows="4"></textarea>

      <button type="submit">Generate Resume</button>
    </form>
  </section>

  {% if resume_data %}
  <section class="preview-panel">
    <h2>Resume Preview</h2>
    {% include 'resume.html' %}
  </section>
  {% endif %}
</div>
{% endblock %}
